{% set name = "repoze.lru" %}
{% set version = "0.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/repoze.lru-{{ version }}.tar.gz
  sha256: 0429a75e19380e4ed50c0694e26ac8819b4ea7851ee1fc7583c8572db80aff77

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 2

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  imports:
    - repoze
    - repoze.lru
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: http://www.repoze.org
  license: BSD-3-Clause AND 0BSD
  license_family: BSD
  license_file:
    - COPYRIGHT.txt
    - LICENSE.txt
  summary: A tiny LRU cache implementation and decorator
  dev_url: https://github.com/repoze/repoze.lru

extra:
  recipe-maintainers:
    - rxm7706
    - nicoddemus
